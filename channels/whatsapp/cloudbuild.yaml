steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--platform=linux/amd64"
      - "-f"
      - "Dockerfile"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}:${_VERSION}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}:latest"
      - "."

  # Push the image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        echo "Deploying ${_CLOUD_RUN_SERVICE}..."
        gcloud run deploy "${_CLOUD_RUN_SERVICE}" \
          --image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}:${_VERSION}" \
          --region="${_REGION}" \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --set-env-vars="GCS_BUCKET=${_GCS_BUCKET},GCS_PREFIX=influencers" \
          --allow-unauthenticated

substitutions:
  _REGION: europe-west4
  _REPO: testmind-docker-repo
  _IMAGE_NAME: wiswiz-whatsapp-crm
  _CLOUD_RUN_SERVICE: wiswiz-whatsapp-crm
  _VERSION: latest
  _GCS_BUCKET: testmind-influencer-data

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}:${_VERSION}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}:latest"

tags:
  - wiswiz-whatsapp-crm
